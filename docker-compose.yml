version: '3.8'

services:
  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: knowledge-base-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=Knowledge Base API
      - DB_FILE=/app/data/docstore.db
      # - CORS_ORIGINS=http://localhost:3000,http://localhost:80,http://frontend
    volumes:
      # Persist databases
      - backend-data:/app/data
      # Cache for ML models
      - model-cache:/root/.cache/embedding_models
      # Development: mount source code (comment out for production)
      # - ./backend:/app
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: knowledge-base-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  # Persistent volume for backend data
  backend-data:
    driver: local
  # Cache for ML models (sentence-transformers)
  model-cache:
    driver: local

networks:
  app-network:
    driver: bridge
